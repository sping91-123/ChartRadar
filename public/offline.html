<!-- 차트 레이더가 오프라인일 때 보여주는 최소 안내 화면. -->
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>차트 레이더 오프라인</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, rgba(14, 165, 233, 0.18), transparent 28rem), #050608;
        color: #e5f6ff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      }
      main {
        width: min(88vw, 420px);
        border: 1px solid rgba(56, 189, 248, 0.22);
        border-radius: 18px;
        padding: 24px;
        background: rgba(15, 23, 42, 0.82);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0;
        font-size: 22px;
      }
      p {
        margin: 12px 0 0;
        color: #94a3b8;
        line-height: 1.7;
        font-size: 14px;
      }
      a {
        display: inline-flex;
        margin-top: 18px;
        min-height: 42px;
        align-items: center;
        border-radius: 10px;
        padding: 0 14px;
        background: #38bdf8;
        color: #020617;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>지금은 레이더 연결이 끊겼습니다.</h1>
      <p>차트 레이더는 실시간 시장 데이터를 확인해야 합니다. 네트워크가 돌아오면 다시 레이더를 켜주세요.</p>
      <a href="/survival">다시 시도하기</a>
    </main>
  </body>
</html>
