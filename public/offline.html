<!-- Chart Radar가 오프라인일 때 보여주는 최소 안내 화면. -->
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Chart Radar Offline</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #0a0a0d;
        color: #f7f8fb;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      }

      main {
        width: min(88vw, 420px);
        border-top: 1px solid rgba(148, 163, 184, 0.22);
        border-bottom: 1px solid rgba(148, 163, 184, 0.22);
        padding: 24px 0;
      }

      h1 {
        margin: 0;
        font-size: 22px;
      }

      p {
        margin: 12px 0 0;
        color: #94a3b8;
        line-height: 1.7;
        font-size: 14px;
      }

      a {
        display: inline-flex;
        margin-top: 18px;
        min-height: 42px;
        align-items: center;
        border-radius: 8px;
        padding: 0 14px;
        background: #4b72f6;
        color: #ffffff;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>지금은 레이더에 연결할 수 없습니다.</h1>
      <p>Chart Radar는 실시간 시장 데이터를 확인해야 합니다. 네트워크가 돌아오면 다시 레이더를 켜주세요.</p>
      <a href="/">다시 시도하기</a>
    </main>
  </body>
</html>
