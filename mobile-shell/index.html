<!-- Capacitor 원격 앱 주소가 없을 때 표시하는 임시 모바일 shell입니다. -->
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Chart Radar Mobile</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #0b0b0f;
        color: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      }

      main {
        width: min(86vw, 420px);
        border-top: 1px solid rgba(148, 163, 184, 0.22);
        border-bottom: 1px solid rgba(148, 163, 184, 0.22);
        padding: 24px 0;
      }

      h1 {
        margin: 0;
        font-size: 22px;
      }

      p {
        margin: 12px 0 0;
        color: #94a3b8;
        line-height: 1.7;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Chart Radar 앱 주소가 필요합니다.</h1>
      <p>앱스토어 빌드 전 `CAPACITOR_SERVER_URL`에 배포된 Chart Radar 주소를 넣고 `npm run app:sync`를 실행해주세요.</p>
    </main>
  </body>
</html>
