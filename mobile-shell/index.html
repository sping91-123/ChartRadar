<!-- Capacitor 원격 앱 주소가 없을 때 표시되는 임시 모바일 쉘. -->
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Chart Radar Mobile</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #050608;
        color: #e0f2fe;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      }
      main {
        width: min(86vw, 420px);
        border: 1px solid rgba(56, 189, 248, 0.24);
        border-radius: 18px;
        padding: 24px;
        background: rgba(15, 23, 42, 0.88);
      }
      h1 {
        margin: 0;
        font-size: 22px;
      }
      p {
        margin: 12px 0 0;
        color: #94a3b8;
        line-height: 1.7;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Chart Radar 앱 주소가 필요합니다.</h1>
      <p>앱스토어 빌드 전 `CAPACITOR_SERVER_URL`에 배포된 Chart Radar 주소를 넣고 `npm run app:sync`를 실행해주세요.</p>
    </main>
  </body>
</html>
